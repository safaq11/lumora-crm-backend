# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
# Dynamically assigns the port given by Render, defaults to 8080 locally
server.port=${PORT:8080}

# ===================================================================
# DATABASE CONFIGURATION (RAILWAY CONNECTION)
# ===================================================================
# These values will be safely injected from your Render Environment tab
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# Automatically updates your database tables structure based on your entity classes
spring.jpa.hibernate.ddl-auto=update

# Shows SQL queries in the logs (Very helpful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Ensures Hibernate uses the correct SQL dialect for MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect